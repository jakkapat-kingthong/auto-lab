name: Daily Pulse

on:
  schedule:
    - cron: '0 4 * * *'   # 11:00 Bangkok (UTC+7) ทุกวัน
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pulse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate session files
        run: python scripts/pulse.py

      - name: Commit each session individually
        run: |
          git config user.email "${{ secrets.GIT_EMAIL }}"
          git config user.name "${{ secrets.GIT_NAME }}"
          git pull --rebase origin main

          TODAY=$(date +'%Y-%m-%d')
          SESSION_DIR="journal/$TODAY"

          if [ ! -d "$SESSION_DIR" ]; then
            echo "[skip] No sessions today (rest day)"
            exit 0
          fi

          COUNT=0
          for f in "$SESSION_DIR"/session-*.md; do
            [ -f "$f" ] || continue
            git add "$f"
            git diff --staged --quiet && continue
            SESSION_NUM=$(basename "$f" .md | sed 's/session-//')
            git commit -m "chore(journal): $TODAY session $SESSION_NUM"
            COUNT=$((COUNT + 1))
          done

          if [ "$COUNT" -gt 0 ]; then
            git push origin main
            echo "[pulse] Pushed $COUNT session commits"
          else
            echo "[skip] Sessions already committed"
          fi
